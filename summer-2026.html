<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Linden Family · Summer 2026</title>
<!--
  Campaign: Summer 2026
  Font: Bricolage Grotesque (display) + Inter Tight (UI)
  Reference: Vibrant Orthodontics - center photo, "FREE CONSULTATION" pill, schedule button
  Boss copy (verbatim):
    Headline: "Summer is the easiest time to begin"
    Sub:      "Start without missing school"
-->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&family=Inter+Tight:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
<style>
  /* ============================================================
     LINDEN FAMILY ORTHODONTICS - BRANDED DEMO (Terracotta + Sage)
     Fake brand applied to seasonal template. See BRAND-KIT.md.
     ============================================================ */
  :root {
    --ink: #412234;
    --charcoal: #6F666B;
    --graphite: #6F666B;
    --mid: #6F666B;
    --line: #FFFFFF;
    --soft: #FFFFFF;
    --paper: #FFFFFF;
    --bone: #FFFFFF;
  }
  *,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 1080px; height: 1080px;
    overflow: hidden;
    background: #FFFFFF;
    font-family: 'Inter Tight', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  body {
    display: flex; justify-content: center; align-items: center;
  }
  .ad {
    width: 1080px; height: 1080px;
    background: var(--paper); color: var(--ink);
    position: relative; overflow: hidden;
    box-shadow: 0 30px 80px -20px rgba(111,102,107,.25);
    display: grid;
    grid-template-rows: auto auto 1fr auto auto;
    padding: 48px 60px 48px;
  }

  /* Logo top center */
  .logo {
    display: flex; align-items: center; gap: 12px;
    justify-content: center;
    z-index: 5; position: relative;
  }
  .logo__mark {
    width: 50px; height: 50px;
    background: var(--ink); color: var(--paper);
    display: grid; place-items: center;
    font-family: 'Bricolage Grotesque', sans-serif;
    font-weight: 800; font-size: 22px;
    border-radius: 12px;
  }
  .logo__type {
    font-family: 'Bricolage Grotesque', sans-serif;
    font-weight: 700; font-size: 22px;
    letter-spacing: 1px; line-height: 1;
    text-transform: uppercase;
  }
  .logo__type small {
    display: block; font-family: 'Inter Tight', sans-serif;
    font-size: 9px; letter-spacing: 5px;
    color: var(--mid); font-weight: 600; margin-top: 5px;
  }

  /* Headline area */
  .heading {
    text-align: center;
    margin-top: 26px;
    z-index: 5; position: relative;
  }
  .eyebrow {
    font-family: 'Bricolage Grotesque', sans-serif;
    font-style: italic;
    font-size: 22px; color: var(--charcoal);
    font-weight: 500;
    margin-bottom: 8px;
  }
  h1 {
    font-family: 'Bricolage Grotesque', sans-serif;
    font-size: 88px; line-height: .95;
    font-weight: 700;
    letter-spacing: -2px;
  }
  h1 .easiest {
    font-style: italic;
    font-weight: 500;
    color: var(--charcoal);
  }

  /* Photo zone - center */
  .photo {
    margin: 22px auto 0;
    width: 440px; height: 440px;
    border-radius: 16px;
    border: 1px solid var(--line);
    background: var(--soft);
    background-image:
      repeating-linear-gradient(-45deg,
        rgba(111,102,107,.04) 0,
        rgba(111,102,107,.04) 1px,
        transparent 1px,
        transparent 14px);
    display: grid; place-items: center;
    position: relative;
    z-index: 4;
  }
  .photo__lbl {
    background: var(--paper);
    border: 1px solid var(--line);
    padding: 12px 18px;
    border-radius: 999px;
    font-family: 'Inter Tight', sans-serif;
    font-size: 10px; letter-spacing: 5px;
    text-transform: uppercase; color: var(--mid);
    font-weight: 700;
  }

  /* "FREE CONSULTATION" pill below photo */
  .consult-pill {
    margin: 18px auto 0;
    background: var(--ink); color: var(--paper);
    padding: 16px 56px;
    border-radius: 999px;
    text-align: center;
    width: max-content;
    z-index: 5; position: relative;
  }
  .consult-pill b {
    font-family: 'Bricolage Grotesque', sans-serif;
    font-weight: 800; font-size: 22px;
    letter-spacing: 4px; text-transform: uppercase;
  }

  /* Schedule + sub */
  .footer {
    margin-top: 14px;
    display: grid; grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 20px;
    z-index: 5; position: relative;
  }
  .footer .sub {
    font-family: 'Bricolage Grotesque', sans-serif;
    font-style: italic; font-size: 18px;
    color: var(--charcoal); text-align: right;
  }
  .schedule-btn {
    background: transparent;
    border: 2px solid var(--ink); color: var(--ink);
    padding: 14px 30px; border-radius: 999px;
    font-family: 'Bricolage Grotesque', sans-serif;
    font-weight: 800; font-size: 15px;
    letter-spacing: 3px; text-transform: uppercase;
  }
  .braces-line {
    font-family: 'Bricolage Grotesque', sans-serif;
    font-style: italic; font-weight: 500;
    font-size: 18px; color: var(--charcoal);
  }

    /* ============================================================
     LINDEN FAMILY ORTHODONTICS - BRAND INTEGRATION OVERRIDES
     Charcoal Blue + Golden Pollen + Tea Green + Midnight Violet
     ============================================================ */
  :root {
    --terra: #FFC857;
    --terra-deep: #412234;
    --sage: rgba(111,102,107,0.10);
    --sage-deep: #6F666B;
    --sage-dark: #6F666B;
    --ivory: #FFFFFF;
    --linden-line: #6F666B;
    --ink-violet: #412234;
  }
  /* Logo mark - charcoal blue circle with golden leaf */
  .logo__mark {
    background: #6F666B !important;
    color: #FFFFFF !important;
    border-color: #6F666B !important;
    overflow: hidden;
    padding: 0;
  }
  .logo__mark .brand-logo-mark {
    width: 100%; height: 100%; display: block;
  }

  /* CTAs and accent surfaces - golden pollen */
  .cta, .card__cta, .schedule-btn, .schedule, .consult-pill, .book-cta,
  .free-pill, .cta-banner, .offer-pill, .offer-bar__btn, .schedule-badge {
    background: #FFC857 !important;
    color: #6F666B !important;
    border-color: #FFC857 !important;
  }
  .cta:hover, .card__cta:hover { background: #412234 !important; }

  /* Inverted/dark ads (Black Friday) - midnight violet for max drama */
  .ad--ink { background: #412234 !important; }
  .score-bar, .footer-cta__bar { background: #6F666B !important; }

  /* Offer stamps - golden pollen accent */
  .stamp, .offer-stamp, .ny-stamp {
    background: #FFC857 !important;
    color: #6F666B !important;
    border-color: #FFC857 !important;
  }
  .stamp b, .stamp .num, .stamp span { color: #6F666B !important; }

  /* Star ratings, special accents */
  .proof__stars { color: #FFC857 !important; }

  /* Photo placeholder backgrounds - tea green */
  .photo, .portrait, .ad-preview {
    background-color: rgba(111,102,107,0.10) !important;
  }
  .photo__lbl, .portrait__lbl {
    background: #FFFFFF !important;
    border-color: #6F666B !important;
    color: #6F666B !important;
  }

  /* AI image placement */
  .photo__img, .portrait__img {
    position: absolute;
    inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
    z-index: 1;
  }
  .portrait { position: relative; overflow: hidden; } .photo { overflow: hidden; }
  .portrait { border-radius: 50%; }

  /* Container labels overlaid on top of images */
  .photo .photo__lbl, .portrait .portrait__lbl, .ad-preview .photo__lbl {
    z-index: 0;
  }

  /* Header / sectional ink fills - midnight violet */
  .holiday-tag, .reserve { border-color: #412234 !important; }


  /* === Uniform brand wordmark (Lora) across all ads === */
  @import url('https://fonts.googleapis.com/css2?family=Lora:wght@500;600;700&family=Inter:wght@600;700&display=swap');
  .logo {
    display: flex !important;
    align-items: center !important;
    gap: 12px !important;
  }
  .logo__mark {
    width: 56px !important;
    height: 56px !important;
    flex-shrink: 0 !important;
    border-radius: 50% !important;
  }
  .logo__type {
    font-family: 'Lora', Georgia, serif !important;
    font-weight: 600 !important;
    font-size: 22px !important;
    line-height: 1 !important;
    letter-spacing: 0.5px !important;
    text-transform: none !important;
    font-style: normal !important;
  }
  .logo__type small {
    display: block !important;
    font-family: 'Inter', system-ui, sans-serif !important;
    font-weight: 600 !important;
    font-size: 9px !important;
    letter-spacing: 4px !important;
    text-transform: uppercase !important;
    margin-top: 6px !important;
    line-height: 1 !important;
    font-style: normal !important;
  }
</style>
</head>
<body>
  <section class="ad">
    <div class="logo">
      <div class="logo__mark"><svg viewBox="0 0 56 56" xmlns="http://www.w3.org/2000/svg" class="brand-logo-mark"><circle cx="28" cy="28" r="28" fill="#6F666B"/><path d="M28 13 C22 18 18 22 18 27 C18 32 22 36 28 41 C34 36 38 32 38 27 C38 22 34 18 28 13 Z" fill="#FFC857"/><path d="M28 17 L28 41" stroke="#412234" stroke-width="1.3" stroke-linecap="round"/></svg></div>
      <div class="logo__type">Linden Family<small>Orthodontics</small></div>
    </div>

    <div class="heading">
      <h1>Summer is the<br/><span class="easiest">easiest time</span><br/>to begin.</h1>
    </div>

    <div class="photo">
      <img class="photo__img" src="photos/SU-01.jpg" alt="Photo SU-01" loading="lazy" /><span class="photo__lbl">[ Photo · SU-01 ]</span>
    </div>

    <div class="consult-pill">
      <b>★ Free Consultation</b>
    </div>

    <div class="footer">
      <span class="braces-line">Flexible appointments</span>
      <a class="schedule-btn" href="#">Schedule Now</a>
      <span class="sub">Start without missing school</span>
    </div>
  </section>
</body>
</html>
