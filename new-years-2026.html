<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Linden Family · New Year's 2026</title>
<!--
  Campaign: New Year's 2026
  Font: Cormorant Garamond (display) + Inter (UI)
  Reference: NY_2026_V1_Square (Chang) - split layout, hand-drawn arrow at smile, oval CTA
  Boss copy (verbatim):
    Headline: "New Year, New Smile"
    Sub:      "Start the year with confidence"
-->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* ============================================================
     LINDEN FAMILY ORTHODONTICS - BRANDED DEMO (Terracotta + Sage)
     Fake brand applied to seasonal template. See BRAND-KIT.md.
     ============================================================ */
  :root {
    --ink: #412234;
    --charcoal: #6F666B;
    --graphite: #6F666B;
    --mid: #6F666B;
    --line: #FFFFFF;
    --soft: #FFFFFF;
    --paper: #FFFFFF;
    --bone: #FFFFFF;
  }
  *,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 1080px; height: 1080px;
    overflow: hidden;
    background: #FFFFFF;
    font-family: 'Inter', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  body {
    display: flex; justify-content: center; align-items: center;
  }
  .ad {
    width: 1080px; height: 1080px; background: var(--paper);
    color: var(--ink); position: relative; overflow: hidden;
    box-shadow: 0 30px 80px -20px rgba(111,102,107,.25);
    display: grid; grid-template-columns: 1fr 1fr;
  }

  /* LEFT - text */
  .left {
    padding: 70px 60px;
    display: flex; flex-direction: column; justify-content: space-between;
    background: var(--paper);
    position: relative;
  }
  .logo { display: flex; align-items: center; gap: 12px; }
  .logo__mark {
    width: 56px; height: 56px; border-radius: 50%;
    background: var(--ink); color: var(--paper);
    display: grid; place-items: center;
    font-weight: 700; letter-spacing: 1px;
  }
  .logo__type {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 600; font-size: 22px;
    line-height: 1; letter-spacing: 1px;
  }
  .logo__type small {
    display: block; font-family: 'Inter', sans-serif;
    font-size: 9px; letter-spacing: 4px;
    text-transform: uppercase; color: var(--mid);
    margin-top: 5px; font-weight: 600;
  }

  .eyebrow {
    font-family: 'Inter', sans-serif;
    font-size: 11px; letter-spacing: 6px;
    text-transform: uppercase; color: var(--mid);
    font-weight: 600;
    margin-bottom: 18px;
    display: flex; align-items: center; gap: 12px;
  }
  .eyebrow::before {
    content: ""; width: 28px; height: 1px; background: var(--mid);
  }

  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 500;
    font-size: 132px; line-height: .88;
    letter-spacing: -2px;
    color: var(--ink);
  }
  h1 .new {
    font-style: italic; font-weight: 500;
    display: block;
  }
  h1 .smile {
    font-weight: 600;
    display: block;
  }
  .sub {
    margin-top: 26px;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 26px; color: var(--charcoal);
    line-height: 1.4; max-width: 380px;
  }

  .cta-row {
    margin-top: 36px;
    display: flex; align-items: center; gap: 18px;
  }
  .cta {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 600;
    font-size: 22px;
    color: var(--ink);
    background: transparent;
    border: 1.5px solid var(--ink);
    padding: 16px 34px;
    border-radius: 999px;
    letter-spacing: .5px;
    display: inline-flex; align-items: center; gap: 10px;
  }
  .braces-line {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 18px; color: var(--charcoal);
  }

  .footer-meta {
    display: flex; align-items: center; gap: 16px;
    font-family: 'Inter', sans-serif;
    font-size: 11px; letter-spacing: 4px;
    text-transform: uppercase; color: var(--mid);
    font-weight: 600;
  }
  .footer-meta b {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic; font-size: 18px;
    color: var(--ink); text-transform: none;
    letter-spacing: 0; font-weight: 600;
  }

  /* RIGHT - photo zone */
  .right {
    background: var(--soft);
    position: relative; overflow: hidden;
  }
  .photo {
    position: absolute; inset: 0;
    background-image:
      repeating-linear-gradient(-45deg,
        rgba(111,102,107,.04) 0,
        rgba(111,102,107,.04) 1px,
        transparent 1px,
        transparent 14px);
    display: grid; place-items: center;
  }
  .photo__lbl {
    background: var(--paper); border: 1px solid var(--line);
    padding: 12px 18px; border-radius: 999px;
    font-size: 10px; letter-spacing: 5px; text-transform: uppercase;
    color: var(--mid); font-weight: 700;
  }

  /* Stamp top right */
  .stamp {
    position: absolute;
    top: 50px; right: 50px;
    width: 150px; height: 150px;
    border: 1.5px solid var(--ink);
    border-radius: 50%;
    display: grid; place-items: center;
    text-align: center;
    transform: rotate(8deg);
    background: var(--paper);
    z-index: 4;
  }
  .stamp b {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 600; font-style: italic;
    font-size: 20px; line-height: 1; display: block;
  }
  .stamp .num {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 700; font-size: 38px;
    line-height: 1; display: block; margin: 4px 0;
  }
  .stamp span {
    font-family: 'Inter', sans-serif;
    font-size: 9px; letter-spacing: 3px;
    text-transform: uppercase; color: var(--mid);
    font-weight: 700;
  }

    /* ============================================================
     LINDEN FAMILY ORTHODONTICS - BRAND INTEGRATION OVERRIDES
     Charcoal Blue + Golden Pollen + Tea Green + Midnight Violet
     ============================================================ */
  :root {
    --terra: #FFC857;
    --terra-deep: #412234;
    --sage: rgba(111,102,107,0.10);
    --sage-deep: #6F666B;
    --sage-dark: #6F666B;
    --ivory: #FFFFFF;
    --linden-line: #6F666B;
    --ink-violet: #412234;
  }
  /* Logo mark - charcoal blue circle with golden leaf */
  .logo__mark {
    background: #6F666B !important;
    color: #FFFFFF !important;
    border-color: #6F666B !important;
    overflow: hidden;
    padding: 0;
  }
  .logo__mark .brand-logo-mark {
    width: 100%; height: 100%; display: block;
  }

  /* CTAs and accent surfaces - golden pollen */
  .cta, .card__cta, .schedule-btn, .schedule, .consult-pill, .book-cta,
  .free-pill, .cta-banner, .offer-pill, .offer-bar__btn, .schedule-badge {
    background: #FFC857 !important;
    color: #6F666B !important;
    border-color: #FFC857 !important;
  }
  .cta:hover, .card__cta:hover { background: #412234 !important; }

  /* Inverted/dark ads (Black Friday) - midnight violet for max drama */
  .ad--ink { background: #412234 !important; }
  .score-bar, .footer-cta__bar { background: #6F666B !important; }

  /* Offer stamps - golden pollen accent */
  .stamp, .offer-stamp, .ny-stamp {
    background: #FFC857 !important;
    color: #6F666B !important;
    border-color: #FFC857 !important;
  }
  .stamp b, .stamp .num, .stamp span { color: #6F666B !important; }

  /* Star ratings, special accents */
  .proof__stars { color: #FFC857 !important; }

  /* Photo placeholder backgrounds - tea green */
  .photo, .portrait, .ad-preview {
    background-color: rgba(111,102,107,0.10) !important;
  }
  .photo__lbl, .portrait__lbl {
    background: #FFFFFF !important;
    border-color: #6F666B !important;
    color: #6F666B !important;
  }

  /* AI image placement */
  .photo__img, .portrait__img {
    position: absolute;
    inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
    z-index: 1;
  }
  .portrait { position: relative; overflow: hidden; } .photo { overflow: hidden; }
  .portrait { border-radius: 50%; }

  /* Container labels overlaid on top of images */
  .photo .photo__lbl, .portrait .portrait__lbl, .ad-preview .photo__lbl {
    z-index: 0;
  }

  /* Header / sectional ink fills - midnight violet */
  .holiday-tag, .reserve { border-color: #412234 !important; }


  /* === Uniform brand wordmark (Lora) across all ads === */
  @import url('https://fonts.googleapis.com/css2?family=Lora:wght@500;600;700&family=Inter:wght@600;700&display=swap');
  .logo {
    display: flex !important;
    align-items: center !important;
    gap: 12px !important;
  }
  .logo__mark {
    width: 56px !important;
    height: 56px !important;
    flex-shrink: 0 !important;
    border-radius: 50% !important;
  }
  .logo__type {
    font-family: 'Lora', Georgia, serif !important;
    font-weight: 600 !important;
    font-size: 22px !important;
    line-height: 1 !important;
    letter-spacing: 0.5px !important;
    text-transform: none !important;
    font-style: normal !important;
  }
  .logo__type small {
    display: block !important;
    font-family: 'Inter', system-ui, sans-serif !important;
    font-weight: 600 !important;
    font-size: 9px !important;
    letter-spacing: 4px !important;
    text-transform: uppercase !important;
    margin-top: 6px !important;
    line-height: 1 !important;
    font-style: normal !important;
  }
</style>
</head>
<body>
  <section class="ad">
    <div class="left">
      <div>
        <div class="logo">
          <div class="logo__mark"><svg viewBox="0 0 56 56" xmlns="http://www.w3.org/2000/svg" class="brand-logo-mark"><circle cx="28" cy="28" r="28" fill="#6F666B"/><path d="M28 13 C22 18 18 22 18 27 C18 32 22 36 28 41 C34 36 38 32 38 27 C38 22 34 18 28 13 Z" fill="#FFC857"/><path d="M28 17 L28 41" stroke="#412234" stroke-width="1.3" stroke-linecap="round"/></svg></div>
          <div class="logo__type">Linden Family<small>Orthodontics</small></div>
        </div>

        <div style="margin-top: 60px;">
          <p class="eyebrow">2026 · A Fresh Start</p>
          <h1>
            <span class="new">New Year,</span>
            <span class="smile">New Smile.</span>
          </h1>
          <p class="sub">Start the year with confidence. Easy first step, no commitment.</p>

          <div class="cta-row">
            <a class="cta" href="#">Free Consult →</a>
            <span class="braces-line">Braces <em>or</em> Invisalign</span>
          </div>
        </div>
      </div>

      <div class="footer-meta">
        <b>★ 4.9 from 1,800+ smiles</b>
        <span>· January spots open</span>
      </div>
    </div>

    <div class="right">
      <div class="photo">
        <img class="photo__img" src="photos/NY-01.jpg" alt="Photo NY-01" loading="lazy" /><span class="photo__lbl">[ Photo · NY-01 ]</span>
      </div>
      <div class="stamp">
        <div>
          <b>Save</b>
          <span class="num">$1,500</span>
          <span>Full Treatment</span>
        </div>
      </div>
    </div>
  </section>
</body>
</html>
