<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Linden Family · Spring Break 2026</title>
<!--
  Campaign: Spring Break 2026
  Font: Fraunces (display) + Inter (UI)
  Reference: Embrace Orthodontics - light card overlay on photo, dotted pattern, bullet checks
  Boss copy (verbatim):
    Headline: "Start without missing school"
    Sub:      "Perfect time to begin treatment"
-->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT@0,9..144,400..900,0..100;1,9..144,400..900,0..100&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* ============================================================
     LINDEN FAMILY ORTHODONTICS - BRANDED DEMO (Terracotta + Sage)
     Fake brand applied to seasonal template. See BRAND-KIT.md.
     ============================================================ */
  :root {
    --ink: #412234;
    --charcoal: #6F666B;
    --graphite: #6F666B;
    --mid: #6F666B;
    --line: #FFFFFF;
    --soft: #FFFFFF;
    --paper: #FFFFFF;
    --bone: #FFFFFF;
  }
  *,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 1080px; height: 1080px;
    overflow: hidden;
    background: #FFFFFF;
    font-family: 'Inter', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  body {
    display: flex; justify-content: center; align-items: center;
  }
  .ad {
    width: 1080px; height: 1080px;
    background: var(--soft); color: var(--ink);
    position: relative; overflow: hidden;
    box-shadow: 0 30px 80px -20px rgba(111,102,107,.25);
  }

  /* Logo bar across top */
  .top-bar {
    position: absolute; top: 0; left: 0; right: 0;
    padding: 36px 60px;
    display: flex; justify-content: space-between; align-items: center;
    z-index: 5;
  }
  .logo {
    display: flex; align-items: center; gap: 12px;
  }
  .logo__mark {
    width: 50px; height: 50px;
    background: var(--ink); color: var(--paper);
    display: grid; place-items: center;
    font-family: 'Fraunces', serif; font-weight: 800;
    font-size: 22px; border-radius: 4px;
  }
  .logo__type {
    font-family: 'Fraunces', serif;
    font-weight: 700; font-size: 22px;
    letter-spacing: 1px; line-height: 1;
  }
  .logo__type small {
    display: block; font-family: 'Inter', sans-serif;
    font-size: 9px; letter-spacing: 5px;
    text-transform: uppercase; color: var(--mid);
    font-weight: 600; margin-top: 5px;
  }
  .top-tag {
    font-family: 'Fraunces', serif; font-style: italic;
    font-size: 18px; color: var(--charcoal);
  }
  .top-tag b { font-style: normal; font-weight: 700; }

  /* Decorative dot pattern (right side) */
  .dots {
    position: absolute;
    top: 110px; right: 60px;
    width: 200px; height: 80px;
    background-image: radial-gradient(circle, var(--ink) 2.5px, transparent 3px);
    background-size: 22px 22px;
    opacity: .35;
    z-index: 1;
  }
  .dots-2 {
    position: absolute;
    bottom: 280px; right: 50px;
    width: 110px; height: 110px;
    background-image: radial-gradient(circle, var(--ink) 2.5px, transparent 3px);
    background-size: 22px 22px;
    opacity: .25;
    z-index: 1;
  }

  /* Photo zone - full left side */
  .photo {
    position: absolute;
    top: 0; left: 0;
    width: 55%; height: 100%;
    background: var(--soft);
    background-image:
      repeating-linear-gradient(45deg,
        rgba(111,102,107,.04) 0,
        rgba(111,102,107,.04) 1px,
        transparent 1px,
        transparent 14px);
    display: grid; place-items: center;
  }
  .photo__lbl {
    background: var(--paper); border: 1px solid var(--line);
    padding: 12px 20px; border-radius: 999px;
    font-family: 'Inter', sans-serif;
    font-size: 10px; letter-spacing: 5px;
    text-transform: uppercase; color: var(--mid);
    font-weight: 700;
  }

  /* Card overlay - right */
  .card {
    position: absolute;
    top: 180px; right: 60px;
    width: 480px;
    background: var(--paper);
    padding: 48px 44px 40px;
    border-radius: 8px;
    box-shadow: 0 30px 60px -20px rgba(111,102,107,.18);
    z-index: 4;
  }
  .card__eyebrow {
    font-family: 'Inter', sans-serif;
    font-size: 11px; letter-spacing: 5px;
    text-transform: uppercase; color: var(--mid);
    font-weight: 600; margin-bottom: 14px;
  }
  .card h1 {
    font-family: 'Fraunces', serif;
    font-weight: 700; font-size: 64px;
    line-height: .95; letter-spacing: -1px;
    color: var(--ink);
  }
  .card h1 em {
    font-style: italic; font-weight: 500;
    color: var(--charcoal);
  }
  .card__sub {
    margin-top: 18px;
    font-family: 'Fraunces', serif;
    font-style: italic; font-size: 22px;
    color: var(--graphite); line-height: 1.4;
  }
  .card__cta {
    margin-top: 28px;
    background: var(--ink); color: var(--paper);
    padding: 18px 30px; border-radius: 8px;
    display: block; text-align: center;
    font-family: 'Fraunces', serif;
    font-weight: 700; font-size: 20px;
    letter-spacing: .5px;
  }
  .card__bullets {
    margin-top: 24px;
    display: grid; gap: 10px;
  }
  .card__bullets li {
    list-style: none;
    display: flex; align-items: center; gap: 12px;
    font-family: 'Inter', sans-serif;
    font-size: 14px; color: var(--graphite);
    font-weight: 500;
  }
  .card__bullets li::before {
    content: "✓"; color: var(--ink);
    font-weight: 700; font-size: 16px;
  }

  /* Bottom CTA badge - bottom right corner */
  .schedule-badge {
    position: absolute;
    right: 60px; bottom: 60px;
    z-index: 6;
    background: var(--paper);
    border: 1px solid var(--line);
    padding: 18px 26px;
    border-radius: 8px;
    z-index: 5;
    text-align: center;
  }
  .schedule-badge b {
    font-family: 'Fraunces', serif;
    font-size: 26px; font-weight: 700;
    color: var(--ink); display: block; line-height: 1;
  }
  .schedule-badge span {
    font-family: 'Inter', sans-serif;
    font-size: 10px; letter-spacing: 4px;
    text-transform: uppercase; color: var(--mid);
    font-weight: 700; margin-top: 6px; display: block;
  }

    /* ============================================================
     LINDEN FAMILY ORTHODONTICS - BRAND INTEGRATION OVERRIDES
     Charcoal Blue + Golden Pollen + Tea Green + Midnight Violet
     ============================================================ */
  :root {
    --terra: #FFC857;
    --terra-deep: #412234;
    --sage: rgba(111,102,107,0.10);
    --sage-deep: #6F666B;
    --sage-dark: #6F666B;
    --ivory: #FFFFFF;
    --linden-line: #6F666B;
    --ink-violet: #412234;
  }
  /* Logo mark - charcoal blue circle with golden leaf */
  .logo__mark {
    background: #6F666B !important;
    color: #FFFFFF !important;
    border-color: #6F666B !important;
    overflow: hidden;
    padding: 0;
  }
  /* Spring Break: wordmark text in white so it pops over the photo */
  .logo__type { color: #FFFFFF !important; }
  .logo__type small { color: #FFFFFF !important; opacity: .85; }
  .logo__mark .brand-logo-mark {
    width: 100%; height: 100%; display: block;
  }

  /* CTAs and accent surfaces - golden pollen */
  .cta, .card__cta, .schedule-btn, .schedule, .consult-pill, .book-cta,
  .free-pill, .cta-banner, .offer-pill, .offer-bar__btn, .schedule-badge {
    background: #FFC857 !important;
    color: #6F666B !important;
    border-color: #FFC857 !important;
  }
  .cta:hover, .card__cta:hover { background: #412234 !important; }

  /* Inverted/dark ads (Black Friday) - midnight violet for max drama */
  .ad--ink { background: #412234 !important; }
  .score-bar, .footer-cta__bar { background: #6F666B !important; }

  /* Offer stamps - golden pollen accent */
  .stamp, .offer-stamp, .ny-stamp {
    background: #FFC857 !important;
    color: #6F666B !important;
    border-color: #FFC857 !important;
  }
  .stamp b, .stamp .num, .stamp span { color: #6F666B !important; }

  /* Star ratings, special accents */
  .proof__stars { color: #FFC857 !important; }

  /* Photo placeholder backgrounds - tea green */
  .photo, .portrait, .ad-preview {
    background-color: rgba(111,102,107,0.10) !important;
  }
  .photo__lbl, .portrait__lbl {
    background: #FFFFFF !important;
    border-color: #6F666B !important;
    color: #6F666B !important;
  }

  /* AI image placement */
  .photo__img, .portrait__img {
    position: absolute;
    inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
    z-index: 1;
  }
  .portrait { position: relative; overflow: hidden; } .photo { overflow: hidden; }
  .portrait { border-radius: 50%; }

  /* Container labels overlaid on top of images */
  .photo .photo__lbl, .portrait .portrait__lbl, .ad-preview .photo__lbl {
    z-index: 0;
  }

  /* Header / sectional ink fills - midnight violet */
  .holiday-tag, .reserve { border-color: #412234 !important; }


  /* === Uniform brand wordmark (Lora) across all ads === */
  @import url('https://fonts.googleapis.com/css2?family=Lora:wght@500;600;700&family=Inter:wght@600;700&display=swap');
  .logo {
    display: flex !important;
    align-items: center !important;
    gap: 12px !important;
  }
  .logo__mark {
    width: 56px !important;
    height: 56px !important;
    flex-shrink: 0 !important;
    border-radius: 50% !important;
  }
  .logo__type {
    font-family: 'Lora', Georgia, serif !important;
    font-weight: 600 !important;
    font-size: 22px !important;
    line-height: 1 !important;
    letter-spacing: 0.5px !important;
    text-transform: none !important;
    font-style: normal !important;
  }
  .logo__type small {
    display: block !important;
    font-family: 'Inter', system-ui, sans-serif !important;
    font-weight: 600 !important;
    font-size: 9px !important;
    letter-spacing: 4px !important;
    text-transform: uppercase !important;
    margin-top: 6px !important;
    line-height: 1 !important;
    font-style: normal !important;
  }
</style>
</head>
