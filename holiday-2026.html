<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Linden Family · Holiday 2026</title>
<!--
  Campaign: Holiday 2026
  Font: Italiana (display) + Source Serif 4 (body)
  Reference: Tennessee + Superior holiday ads - banner with $ offer, hanging ornaments, snowflakes, photo with festive accents
  Boss copy (verbatim):
    Headline: "Give a gift that lasts a lifetime"
    Sub:      "Confidence is the best gift"
-->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Italiana&family=Source+Serif+4:ital,opsz,wght@0,8..60,200..900;1,8..60,200..900&display=swap" rel="stylesheet">
<style>
  /* ============================================================
     LINDEN FAMILY ORTHODONTICS - BRANDED DEMO (Terracotta + Sage)
     Fake brand applied to seasonal template. See BRAND-KIT.md.
     ============================================================ */
  :root {
    --ink: #412234;
    --charcoal: #6F666B;
    --graphite: #6F666B;
    --mid: #6F666B;
    --line: #FFFFFF;
    --soft: #FFFFFF;
    --paper: #FFFFFF;
    --bone: #FFFFFF;
  }
  *,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 1080px; height: 1080px;
    overflow: hidden;
    background: #FFFFFF;
    font-family: 'Source Serif 4', Georgia, serif;
    -webkit-font-smoothing: antialiased;
  }
  body {
    display: flex; justify-content: center; align-items: center;
  }
  .ad {
    width: 1080px; height: 1080px;
    background: var(--paper); color: var(--ink);
    position: relative; overflow: hidden;
    box-shadow: 0 30px 80px -20px rgba(111,102,107,.25);
    background-image:
      radial-gradient(circle, rgba(111,102,107,.04) 1px, transparent 1.5px);
    background-size: 36px 36px;
  }

  /* Logo top */
  .logo {
    position: absolute; top: 50px; left: 60px;
    display: flex; align-items: center; gap: 12px;
    z-index: 5;
  }
  .logo__mark {
    width: 56px; height: 56px;
    background: var(--ink); color: var(--paper);
    display: grid; place-items: center;
    font-family: 'Italiana', serif;
    font-size: 28px;
    border-radius: 50%;
  }
  .logo__type {
    font-family: 'Italiana', serif;
    font-size: 26px; line-height: 1;
    letter-spacing: 4px;
  }
  .logo__type small {
    display: block; font-family: 'Source Serif 4', serif;
    font-size: 9px; letter-spacing: 5px;
    text-transform: uppercase; color: var(--mid);
    font-weight: 600; margin-top: 6px;
  }

  /* Snowflakes scattered */
  .snow {
    position: absolute;
    color: var(--ink); opacity: .25;
    pointer-events: none;
  }
  .snow svg { width: 100%; height: 100%; fill: currentColor;}
  .snow--s1 { top: 80px; right: 60px; width: 70px;}
  .snow--s2 { top: 240px; right: 200px; width: 40px; opacity: .15;}
  .snow--s3 { bottom: 360px; left: 60px; width: 90px; opacity: .15;}
  .snow--s4 { bottom: 140px; right: 100px; width: 55px;}
  .snow--s5 { bottom: 240px; left: 280px; width: 35px; opacity: .2;}

  /* Banner with $ offer */
  .banner {
    position: absolute;
    top: 185px; left: -40px; right: -40px;
    background: var(--ink); color: var(--paper);
    transform: rotate(-3deg);
    padding: 26px 80px;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 18px;
    box-shadow: 0 14px 40px rgba(111,102,107,.25);
    z-index: 4;
  }
  .banner b {
    font-family: 'Italiana', serif;
    font-size: 60px; letter-spacing: -1px;
    line-height: 1;
    display: inline-flex;
    align-items: center;
  }
  .banner span {
    font-family: 'Source Serif 4', serif;
    font-style: italic;
    font-size: 28px; letter-spacing: 1px;
    line-height: 1;
    display: inline-flex;
    align-items: center;
  }

  /* Hanging ornaments */
  .ornaments {
    position: absolute;
    top: 240px; left: 0; right: 0;
    display: flex; justify-content: center;
    gap: 80px;
    z-index: 3;
  }
  .orn {
    position: relative;
  }
  .orn__string {
    width: 1px; height: 80px;
    background: var(--ink);
    margin: 0 auto;
    opacity: .5;
  }
  .orn__ball {
    width: 70px; height: 70px;
    border-radius: 50%;
    background: var(--ink);
    margin-top: -2px;
    border: 4px solid var(--paper);
    box-shadow: 0 6px 14px rgba(111,102,107,.2);
    position: relative;
  }
  .orn__ball::before {
    content: ""; position: absolute;
    top: -8px; left: 50%; transform: translateX(-50%);
    width: 20px; height: 12px;
    background: var(--paper);
    border: 2px solid var(--ink);
    border-radius: 4px 4px 0 0;
  }
  .orn:nth-child(2) .orn__ball { background: var(--soft); border-color: var(--ink);}
  .orn:nth-child(3) .orn__ball { background: var(--ink);}
  .orn:nth-child(4) .orn__ball { background: var(--paper); border-color: var(--ink);}
  .orn:nth-child(5) .orn__ball { background: var(--ink);}

  .orn:nth-child(1) .orn__string { height: 130px;}
  .orn:nth-child(2) .orn__string { height: 175px;}
  .orn:nth-child(3) .orn__string { height: 145px;}
  .orn:nth-child(4) .orn__string { height: 195px;}
  .orn:nth-child(5) .orn__string { height: 155px;}

  /* Headline below */
  .hero {
    position: absolute;
    bottom: 290px; left: 60px; right: 60px;
    text-align: center;
    z-index: 4;
  }
  .hero h1 {
    font-family: 'Italiana', serif;
    font-weight: 400;
    font-size: 96px; line-height: .95;
    letter-spacing: 1px;
    color: var(--ink);
  }
  .hero h1 .lasts {
    font-family: 'Source Serif 4', serif;
    font-style: italic; font-weight: 300;
    letter-spacing: -1px;
  }
  .hero .sub {
    margin-top: 20px;
    font-family: 'Source Serif 4', serif;
    font-style: italic;
    font-size: 24px; color: var(--charcoal);
  }

  /* Photo zones — symmetric left + right, styled as ornaments */
  .photo {
    position: absolute;
    bottom: 70px;
    width: 200px; height: 200px;
    border-radius: 50%;
    background: var(--soft);
    background-image:
      repeating-linear-gradient(-45deg,
        rgba(111,102,107,.04) 0,
        rgba(111,102,107,.04) 1px,
        transparent 1px,
        transparent 14px);
    border: 4px solid var(--paper);
    box-shadow:
      0 0 0 2px #412234,
      0 14px 30px rgba(111,102,107,.18);
    display: grid; place-items: center;
    z-index: 5;
  }
  .photo--left  { left: 60px; }
  .photo--right { right: 60px; }

  /* Hanging string + cap so photos read as ornaments */
  .photo-string {
    position: absolute;
    bottom: 270px;
    width: 1px;
    height: 570px;
    background: #412234;
    opacity: .55;
    z-index: 3;
  }
  .photo-string--left  { left: 160px; }
  .photo-string--right { right: 160px; }
  .photo-cap {
    position: absolute;
    bottom: 263px;
    width: 28px;
    height: 14px;
    background: var(--paper);
    border: 2px solid #412234;
    border-bottom: 0;
    border-radius: 5px 5px 0 0;
    z-index: 5;
  }
  .photo-cap--left  { left: 146px; }
  .photo-cap--right { right: 146px; }
  .photo__lbl {
    background: var(--paper); border: 1px solid var(--line);
    padding: 8px 14px;
    border-radius: 999px;
    font-family: 'Source Serif 4', serif;
    font-size: 9px; letter-spacing: 4px;
    text-transform: uppercase; color: var(--mid);
    font-weight: 700;
  }

  /* Bottom CTA — centered between the two photos */
  .footer-cta {
    position: absolute;
    left: 50%; transform: translateX(-50%);
    bottom: 110px;
    z-index: 5;
  }
  .footer-cta a {
    background: var(--ink); color: var(--paper);
    padding: 18px 32px; border-radius: 999px;
    font-family: 'Italiana', serif;
    font-size: 22px; letter-spacing: 2px;
    display: inline-block;
  }

    /* ============================================================
     LINDEN FAMILY ORTHODONTICS - BRAND INTEGRATION OVERRIDES
     Charcoal Blue + Golden Pollen + Tea Green + Midnight Violet
     ============================================================ */
  :root {
    --terra: #FFC857;
    --terra-deep: #412234;
    --sage: rgba(111,102,107,0.10);
    --sage-deep: #6F666B;
    --sage-dark: #6F666B;
    --ivory: #FFFFFF;
    --linden-line: #6F666B;
    --ink-violet: #412234;
  }
  /* Logo mark - charcoal blue circle with golden leaf */
  .logo__mark {
    background: #6F666B !important;
    color: #FFFFFF !important;
    border-color: #6F666B !important;
    overflow: hidden;
    padding: 0;
  }
  .logo__mark .brand-logo-mark {
    width: 100%; height: 100%; display: block;
  }

  /* CTAs and accent surfaces - golden pollen */
  .cta, .card__cta, .schedule-btn, .schedule, .consult-pill, .book-cta,
  .free-pill, .cta-banner, .offer-pill, .offer-bar__btn, .schedule-badge {
    background: #FFC857 !important;
    color: #6F666B !important;
    border-color: #FFC857 !important;
  }
  .cta:hover, .card__cta:hover { background: #412234 !important; }

  /* Inverted/dark ads (Black Friday) - midnight violet for max drama */
  .ad--ink { background: #412234 !important; }
  .score-bar, .footer-cta__bar { background: #6F666B !important; }

  /* Offer stamps - golden pollen accent */
  .stamp, .offer-stamp, .ny-stamp {
    background: #FFC857 !important;
    color: #6F666B !important;
    border-color: #FFC857 !important;
  }
  .stamp b, .stamp .num, .stamp span { color: #6F666B !important; }

  /* Star ratings, special accents */
  .proof__stars { color: #FFC857 !important; }

  /* Photo placeholder backgrounds - tea green */
  .photo, .portrait, .ad-preview {
    background-color: rgba(111,102,107,0.10) !important;
  }
  .photo__lbl, .portrait__lbl {
    background: #FFFFFF !important;
    border-color: #6F666B !important;
    color: #6F666B !important;
  }

  /* AI image placement */
  .photo__img, .portrait__img {
    position: absolute;
    inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
    z-index: 1;
  }
  .portrait { position: relative; overflow: hidden; } .photo { overflow: hidden; }
  .portrait { border-radius: 50%; }

  /* Container labels overlaid on top of images */
  .photo .photo__lbl, .portrait .portrait__lbl, .ad-preview .photo__lbl {
    z-index: 0;
  }

  /* Header / sectional ink fills - midnight violet */
  .holiday-tag, .reserve { border-color: #412234 !important; }


  /* === Uniform brand wordmark (Lora) across all ads === */
  @import url('https://fonts.googleapis.com/css2?family=Lora:wght@500;600;700&family=Inter:wght@600;700&display=swap');
  .logo {
    display: flex !important;
    align-items: center !important;
    gap: 12px !important;
  }
  .logo__mark {
    width: 56px !important;
    height: 56px !important;
    flex-shrink: 0 !important;
    border-radius: 50% !important;
  }
  .logo__type {
    font-family: 'Lora', Georgia, serif !important;
    font-weight: 600 !important;
    font-size: 22px !important;
    line-height: 1 !important;
    letter-spacing: 0.5px !important;
    text-transform: none !important;
    font-style: normal !important;
  }
  .logo__type small {
    display: block !important;
    font-family: 'Inter', system-ui, sans-serif !important;
    font-weight: 600 !important;
    font-size: 9px !important;
    letter-spacing: 4px !important;
    text-transform: uppercase !important;
    margin-top: 6px !important;
    line-height: 1 !important;
    font-style: normal !important;
  }
</style>
</head>
<body>
  <section class="ad">
    <div class="logo">
      <div class="logo__mark"><svg viewBox="0 0 56 56" xmlns="http://www.w3.org/2000/svg" class="brand-logo-mark"><circle cx="28" cy="28" r="28" fill="#6F666B"/><path d="M28 13 C22 18 18 22 18 27 C18 32 22 36 28 41 C34 36 38 32 38 27 C38 22 34 18 28 13 Z" fill="#FFC857"/><path d="M28 17 L28 41" stroke="#412234" stroke-width="1.3" stroke-linecap="round"/></svg></div>
      <div class="logo__type">Linden Family<small>Orthodontics</small></div>
    </div>

    <span class="snow snow--s1"><svg viewBox="0 0 100 100"><path d="M50 5 v90 M5 50 h90 M20 20 l60 60 M80 20 l-60 60"/><circle cx="50" cy="50" r="4"/></svg></span>
    <span class="snow snow--s2"><svg viewBox="0 0 100 100"><path d="M50 5 v90 M5 50 h90 M20 20 l60 60 M80 20 l-60 60"/></svg></span>
    <span class="snow snow--s3"><svg viewBox="0 0 100 100"><path d="M50 5 v90 M5 50 h90 M20 20 l60 60 M80 20 l-60 60"/><circle cx="50" cy="50" r="4"/></svg></span>
    <span class="snow snow--s4"><svg viewBox="0 0 100 100"><path d="M50 5 v90 M5 50 h90 M20 20 l60 60 M80 20 l-60 60"/></svg></span>
    <span class="snow snow--s5"><svg viewBox="0 0 100 100"><path d="M50 5 v90 M5 50 h90"/></svg></span>

    <div class="banner">
      <b>$1,500 off</b>
      <span>Giftable · Braces or Clear Aligners</span>
    </div>

    <div class="ornaments">
      <div class="orn"><div class="orn__string"></div><div class="orn__ball"></div></div>
      <div class="orn"><div class="orn__string"></div><div class="orn__ball"></div></div>
      <div class="orn"><div class="orn__string"></div><div class="orn__ball"></div></div>
      <div class="orn"><div class="orn__string"></div><div
