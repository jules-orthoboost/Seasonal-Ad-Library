<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Linden Family · Black Friday 2026</title>
<!--
  Campaign: Black Friday 2026
  Font: Anton (display) + Inter (UI)
  Reference: NY_2026_v3 Smiles Orthodontics - half panel split with offer prominent, photo right, stars decoration top
  Boss copy (verbatim):
    Headline: "Don't buy junk - invest in confidence"
    Sub:      "The only deal that lasts a lifetime"
-->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  /* ============================================================
     LINDEN FAMILY ORTHODONTICS - BRANDED DEMO (Terracotta + Sage)
     Fake brand applied to seasonal template. See BRAND-KIT.md.
     ============================================================ */
  :root {
    --ink: #412234;
    --charcoal: #6F666B;
    --graphite: #6F666B;
    --mid: #6F666B;
    --line: #FFFFFF;
    --soft: #FFFFFF;
    --paper: #FFFFFF;
    --bone: #FFFFFF;
  }
  *,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 1080px; height: 1080px;
    overflow: hidden;
    background: #FFFFFF;
    font-family: 'Inter', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  body {
    display: flex; justify-content: center; align-items: center;
  }
  .ad {
    width: 1080px; height: 1080px;
    background: var(--ink); color: var(--paper);
    position: relative; overflow: hidden;
    box-shadow: 0 30px 80px -20px rgba(111,102,107,.4);
  }

  /* Stars row top - like Smiles ad */
  .stars {
    position: absolute; top: 0; left: 0; right: 0;
    height: 90px;
    display: flex; align-items: center; justify-content: center;
    gap: 28px;
    color: var(--paper); font-size: 22px;
    border-bottom: 1px solid rgba(255,255,255,.1);
    z-index: 5;
  }
  .stars span { opacity: .6; }
  .stars span:nth-child(odd) { opacity: .3; font-size: 16px;}

  /* Two columns */
  .body {
    position: absolute; inset: 90px 0 0 0;
    display: grid; grid-template-columns: 1fr 1fr;
  }
  .left {
    padding: 60px 60px 50px;
    display: flex; flex-direction: column; justify-content: space-between;
    color: var(--paper);
  }
  .right {
    background: var(--soft);
    background-image:
      repeating-linear-gradient(45deg,
        rgba(111,102,107,.06) 0,
        rgba(111,102,107,.06) 1px,
        transparent 1px,
        transparent 14px);
    position: relative;
    display: grid; place-items: center;
    overflow: hidden;
  }
  .right .photo__lbl {
    background: var(--paper); border: 1px solid var(--line);
    color: var(--mid); padding: 12px 18px;
    border-radius: 999px;
    font-family: 'Inter', sans-serif;
    font-size: 10px; letter-spacing: 5px;
    text-transform: uppercase; font-weight: 700;
  }

  /* Logo top left of left panel */
  .logo {
    display: flex; align-items: center; gap: 12px;
  }
  .logo__mark {
    width: 56px; height: 56px;
    background: var(--paper); color: var(--ink);
    border-radius: 12px;
    display: grid; place-items: center;
    font-family: 'Anton', sans-serif;
    font-size: 26px; letter-spacing: 1px;
  }
  .logo__type {
    font-family: 'Anton', sans-serif;
    font-size: 22px; line-height: 1;
    letter-spacing: 2px; color: var(--paper);
  }
  .logo__type small {
    display: block; font-family: 'Inter', sans-serif;
    font-size: 9px; letter-spacing: 5px;
    color: rgba(255,255,255,.55);
    font-weight: 600; margin-top: 6px; letter-spacing: 5px;
  }

  /* Hook */
  .eyebrow {
    font-family: 'Inter', sans-serif;
    font-size: 12px; letter-spacing: 6px;
    text-transform: uppercase;
    color: rgba(255,255,255,.55);
    font-weight: 600; margin-bottom: 14px;
  }
  h1 {
    font-family: 'Anton', sans-serif;
    font-size: 96px; line-height: .95;
    letter-spacing: -1px;
    text-transform: uppercase;
    color: var(--paper);
  }
  h1 .strike {
    text-decoration: line-through;
    text-decoration-thickness: 5px;
    text-decoration-color: var(--paper);
    color: var(--mid);
  }
  h1 .invest {
    display: block;
    font-family: 'Inter', sans-serif;
    font-style: italic; font-weight: 400;
    font-size: 56px; letter-spacing: -1px;
    text-transform: none;
    color: var(--soft);
    margin-top: 6px; line-height: 1;
  }

  .sub-italic {
    margin-top: 18px;
    font-family: 'Inter', sans-serif;
    font-style: italic; font-size: 18px;
    color: rgba(255,255,255,.7);
    line-height: 1.4; max-width: 420px;
  }

  /* The offer prominent */
  .offer {
    margin-top: 32px;
    background: var(--paper); color: var(--ink);
    padding: 22px 30px;
    border-radius: 6px;
    display: inline-flex; align-items: center; gap: 22px;
    width: max-content;
  }
  .offer .amt {
    font-family: 'Anton', sans-serif;
    font-size: 78px; line-height: .9;
    letter-spacing: -2px;
  }
  .offer .what {
    font-family: 'Inter', sans-serif;
    font-size: 11px; letter-spacing: 3px;
    text-transform: uppercase;
    font-weight: 700; color: var(--charcoal);
    line-height: 1.4;
  }
  .offer .what b {
    display: block; font-family: 'Anton', sans-serif;
    font-size: 22px; letter-spacing: 1px;
    color: var(--ink); margin-bottom: 4px;
  }

  /* CTA */
  .cta {
    margin-top: 28px;
    background: transparent; color: var(--paper);
    border: 2px solid var(--paper);
    padding: 16px 30px; border-radius: 6px;
    font-family: 'Anton', sans-serif;
    font-size: 16px; letter-spacing: 4px;
    text-transform: uppercase;
    display: inline-flex; align-items: center; gap: 14px;
    width: max-content;
  }

  /* Bottom strip with code */
  .strip {
    border-top: 1px solid rgba(255,255,255,.18);
    padding-top: 16px; margin-top: auto;
    display: flex; justify-content: space-between;
    align-items: center;
    font-family: 'Inter', sans-serif;
    font-size: 11px; letter-spacing: 4px;
    text-transform: uppercase;
    color: rgba(255,255,255,.55);
    font-weight: 600;
  }
  .strip code {
    font-family: 'Anton', sans-serif;
    font-size: 18px; letter-spacing: 2px;
    color: var(--paper);
    text-transform: none;
  }

  /* Big offer stamp on right photo */
  .photo-stamp {
    position: absolute;
    top: 60px; right: 60px;
    width: 170px; height: 170px;
    border-radius: 50%;
    background: var(--ink); color: var(--paper);
    display: grid; place-items: center;
    text-align: center;
    transform: rotate(-12deg);
    border: 4px solid var(--paper);
  }
  .photo-stamp b {
    font-family: 'Anton', sans-serif;
    font-size: 16px; line-height: 1; letter-spacing: 1px;
    text-transform: uppercase;
  }
  .photo-stamp .num {
    font-family: 'Anton', sans-serif;
    font-size: 38px; display: block;
    line-height: 1; margin: 4px 0;
  }
  .photo-stamp span {
    font-family: 'Inter', sans-serif;
    font-size: 9px; letter-spacing: 3px;
    color: rgba(255,255,255,.7); font-weight: 600;
    text-transform: uppercase; display: block;
  }

    /* ============================================================
     LINDEN FAMILY ORTHODONTICS - BRAND INTEGRATION OVERRIDES
     Charcoal Blue + Golden Pollen + Tea Green + Midnight Violet
     ============================================================ */
  :root {
    --terra: #FFC857;
    --terra-deep: #412234;
    --sage: rgba(111,102,107,0.10);
    --sage-deep: #6F666B;
    --sage-dark: #6F666B;
    --ivory: #FFFFFF;
    --linden-line: #6F666B;
    --ink-violet: #412234;
  }
  /* Logo mark - charcoal blue circle with golden leaf */
  .logo__mark {
    background: #6F666B !important;
    color: #FFFFFF !important;
    border-color: #6F666B !important;
    overflow: hidden;
    padding: 0;
  }
  .logo__mark .brand-logo-mark {
    width: 100%; height: 100%; display: block;
  }

  /* CTAs and accent surfaces - golden pollen */
  .cta, .card__cta, .schedule-btn, .schedule, .consult-pill, .book-cta,
  .free-pill, .cta-banner, .offer-pill, .offer-bar__btn, .schedule-badge {
    background: #FFC857 !important;
    color: #6F666B !important;
    border-color: #FFC857 !important;
  }
  .cta:hover, .card__cta:hover { background: #412234 !important; }

  /* Inverted/dark ads (Black Friday) - midnight violet for max drama */
  .ad--ink { background: #412234 !important; }
  .score-bar, .footer-cta__bar { background: #6F666B !important; }

  /* Offer stamps - golden pollen accent */
  .stamp, .offer-stamp, .ny-stamp {
    background: #FFC857 !important;
    color: #6F666B !important;
    border-color: #FFC857 !important;
  }
  .stamp b, .stamp .num, .stamp span { color: #6F666B !important; }

  /* Star ratings, special accents */
  .proof__stars { color: #FFC857 !important; }

  /* Photo placeholder backgrounds - tea green */
  .photo, .portrait, .ad-preview {
    background-color: rgba(111,102,107,0.10) !important;
  }
  .photo__lbl, .portrait__lbl {
    background: #FFFFFF !important;
    border-color: #6F666B !important;
    color: #6F666B !important;
  }

  /* AI image placement */
  .photo__img, .portrait__img {
    position: absolute;
    inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
    z-index: 1;
  }
  .portrait { position: relative; overflow: hidden; } .photo { overflow: hidden; }
  .portrait { border-radius: 50%; }

  /* Container labels overlaid on top of images */
  .photo .photo__lbl, .portrait .portrait__lbl, .ad-preview .photo__lbl {
    z-index: 0;
  }

  /* Header / sectional ink fills - midnight violet */
  .holiday-tag, .reserve { border-color: #412234 !important; }


  /* === Uniform brand wordmark (Lora) across all ads === */
  @import url('https://fonts.googleapis.com/css2?family=Lora:wght@500;600;700&family=Inter:wght@600;700&display=swap');
  .logo {
    display: flex !important;
    align-items: center !important;
    gap: 12px !important;
  }
  .logo__mark {
    width: 56px !important;
    height: 56px !important;
    flex-shrink: 0 !important;
    border-radius: 50% !important;
  }
  .logo__type {
    font-family: 'Lora', Georgia, serif !important;
    font-weight: 600 !important;
    font-size: 22px !important;
    line-height: 1 !important;
    letter-spacing: 0.5px !important;
    text-transform: none !important;
    font-style: normal !important;
  }
  .logo__type small {
    display: block !important;
    font-family: 'Inter', system-ui, sans-serif !important;
    font-weight: 600 !important;
    font-size: 9px !important;
    letter-spacing: 4px !important;
    text-transform: uppercase !important;
    margin-top: 6px !important;
    line-height: 1 !important;
    font-style: normal !important;
  }
</style>
</head>
<body>
  <section class="ad">
    <div class="stars">
      <span>★</span><span>✦</span><span>★</span><span>✦</span><span>★</span><span>✦</span><span>★</span><span>✦</span><span>★</span><span>✦</span><span>★</span>
    </div>

    <div class="body">
      <div class="left">
        <div>
          <div class="logo">
            <div class="logo__mark"><svg viewBox="0 0 56 56" xmlns="http://www.w3.org/2000/svg" class="brand-logo-mark"><circle cx="28" cy="28" r="28" fill="#6F666B"/><path d="M28 13 C22 18 18 22 18 27 C18 32 22 36 28 41 C34 36 38 32 38 27 C38 22 34 18 28 13 Z" fill="#FFC857"/><path d="M28 17 L28 41" stroke="#412234" stroke-width="1.3" stroke-linecap="round"/></svg></div>
            <div class="logo__type">Linden Family<small>Orthodontics</small></div>
          </div>

          <div style="margin-top: 50px;">
            <p class="eyebrow">Black Friday · 2026</p>
            <h1>Don't buy <span class="strike">junk.</span><br/><span class="invest">Invest in confidence.</span></h1>
            <p class="sub-italic">The only deal that lasts a lifetime.</p>

            <div class="offer">
              <span class="amt">$2,500</span>
              <span class="what">
                <b>OFF</b>
                Braces · Invisalign
              </span>
            </div>

            <a class="cta" href="#">Claim Black Friday →</a>
          </div>
        </div>

        <div class="strip">
          <span>Ends Cyber Monday</span>
        </div>
      </div>

      <div class="right">
        <img class="photo__img" src="photos/BF-01.jpg" alt="Photo BF-01" loading="lazy" /><span class="photo__lbl">[ Photo · BF-01 ]</span>
        <div class="photo-stamp">
          <div>
            <b>Limited</b>
            <span class="num">72</span>
            <span>Hours Only</span>
          </div>
        </div>
      </div>
    </div>
  </section>
</body>
</html>
